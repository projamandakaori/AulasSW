<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <script src="calc.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
    <h1>Calculadora</h1>
    <br>
        <div class="borda">
        <input type="text" id="Visor" class="visor" value="0">
        <table>
            <tr>
                <td><button id="btnce" class="botao" onclick="exibirNumero('CE')">CE
                <td><button id="btnc" class="botao" onclick="exibirNumero('C')">C</button></td>
                <td><button id="btnseta" class="botao" onclick="exibirNumero('[-')">[-</button></td>
                <td><button id="btnporc" class="botao" onclick="exibirNumero('%')">%</button></td>
            </tr>
            <tr>
                <td><button id="num1" class="botao" onclick="exibirNumero(1)">1</button></td>
                <td><button id="num2" class="botao" onclick="exibirNumero(2)">2</button></td>
                <td><button id="num3" class="botao" onclick="exibirNumero(3)">3</button></td>
                <td><button id="btnmais" class="botao" onclick="exibirNumero('+')">+</button></td>
            </tr>
            <tr>
                <td><button id="num4" class="botao" onclick="exibirNumero(4)">4</button></td>
                <td><button id="num5" class="botao" onclick="exibirNumero(5)">5</button></td>
                <td><button id="num6" class="botao" onclick="exibirNumero(6)">6</button></td>
                <td><button id="btnmenos" class="botao" onclick="exibirNumero('-')">-</button></td>
            </tr>
            <tr>
                <td><button id="num7" class="botao" onclick="exibirNumero(7)">7</button></td>
                <td><button id="num8" class="botao" onclick="exibirNumero(8)">8</button></td>
                <td><button id="num9" class="botao" onclick="exibirNumero(9)">9</button></td>
                <td><button id="btnvezes" class="botao" onclick="exibirNumero('*')">*</button></td>
            </tr>
            <tr>
                <td><button id="num0" class="botao" onclick="exibirNumero(0)">0</button></td>
                <td><button id="btnvirg" class="botao" onclick="exibirNumero(',')">,</button></td>
                <td><button id="btnigual" class="botao" onclick="exibirNumero('=')">=</button></td>
                <td><button id="btndiv" class="botao" onclick="exibirNumero('/')">/</button></td>
            </tr>
        </table>
    </center>
        </div>
</body>
</html>
